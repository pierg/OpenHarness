name: react
description: ReAct Terminal-Bench baseline agent.
architecture: react
model: gemini-2.5-flash
max_turns: 15
max_tokens: 8192
definition:
  subagent_type: react
  description: Baseline ReAct workflow for Harbor and Terminal-Bench style tasks.
  runner: yaml_workflow
  color: green

subagents:
  thinker:
    name: thinker
    model: gemini-2.5-flash
    max_turns: 1
    max_tokens: 2048
    tools: []
    prompts:
      system: |
        You are a reasoning agent using the ReAct framework for Terminal-Bench style tasks.
        You will be given a task and a history of previous observations from a task environment.

        Analyze the current state and decide what to do next.

        - If the task is NOT complete: provide reasoning and the next single action to take.
        - If the task IS complete: set is_finished to true and provide the final_answer.

        IMPORTANT: Your entire response must be a single JSON object. Do not include any other text.
        JSON schema:
        ```json
        {
          "reasoning": "string",
          "action": "string (command or description of action)",
          "is_finished": "boolean",
          "final_answer": "string (only if is_finished is true)"
        }
        ```

        Example response:
        ```json
        {
          "reasoning": "I need to check the file content first.",
          "action": "read_file path='/app/sum_evens.py'",
          "is_finished": false
        }
        ```

      user: |
        # Task
        {{ instruction }}

        # Current State
        {% if observations %}
        # Previous Steps
        {% for obs in observations %}
        ## Step {{ obs.step }}
        - Reasoning: {{ obs.reasoning }}
        - Action: {{ obs.action }}
        - Observation: {{ obs.observation }}
        {% endfor %}
        {% else %}
        This is the first step.
        {% endif %}

        Decide what to do next. Respond ONLY with the JSON object.

  actor:
    name: actor
    model: gemini-2.5-flash
    max_turns: 8
    max_tokens: 8192
    tools:
      - bash
      - read_file
      - write_file
      - edit_file
      - glob
      - grep
    prompts:
      system: |
        {{ openharness_system_context }}

        # Actor Persona
        You are an executor running inside a task environment.
        Carry out the requested action using the available tools.
        Prefer filesystem inspection before edits, make minimal changes, and verify when the action calls for it.
        Use non-interactive shell commands. Do not ask for human input.

      user: |
        {{ instruction }}
