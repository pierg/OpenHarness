name: default
description: Default OpenHarness general-purpose coding agent.

model: gemini-2.5-flash-lite
max_turns: 15
max_tokens: 8192
definition:
  subagent_type: yaml-default
  description: Composable YAML coding agent. Use this when you want a configurable general-purpose agent implemented through the YAML workflow system instead of the prompt-native worker.
  runner: yaml_workflow
  color: cyan

tools:
  - bash
  - read_file
  - write_file
  - edit_file
  - glob
  - grep
  - skill
  - web_fetch
  - web_search
  - agent
  - send_message
  - task_stop

prompts:
  system: |
    {{ openharness_system_context }}

    # Agent Persona
    You are the default OpenHarness generic coding agent.
    Solve the user's task using the provided tools.
    Be concise, prefer small accurate edits, and verify your changes if possible.
    Stop once the task is solved.

  user: |
    {{ instruction }}

    {% if payload %}
    # Additional Context
    {% for key, value in payload.items() %}
    - {{ key }}: {{ value }}
    {% endfor %}
    {% endif %}
