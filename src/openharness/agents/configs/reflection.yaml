name: reflection
description: Reflection Terminal-Bench baseline agent.
architecture: reflection
model: gemini-2.5-flash
max_turns: 2
max_tokens: 8192
definition:
  subagent_type: reflection
  description: Baseline worker/critic workflow for Harbor and Terminal-Bench style tasks.
  runner: yaml_workflow
  color: yellow

subagents:
  worker:
    name: worker
    model: gemini-2.5-flash
    max_turns: 30
    max_tokens: 8192
    tools:
      - bash
      - read_file
      - write_file
      - edit_file
      - glob
      - grep
    prompts:
      system: |
        {{ openharness_system_context }}

        # Worker Persona
        You are a coding agent running inside a task environment.
        Read the task instructions carefully, inspect the filesystem before editing, make the smallest correct changes, and verify with available tests or task-specific checks.
        Use non-interactive shell commands. Do not ask for human input.
        Do not modify the underlying system environment (like upgrading system python packages) to fix application bugs; fix the application code instead.
        When running commands like wget, avoid recursive flags that hang (like `wget -r`).
        Stop only after the task is verified or after you have found a concrete blocker that prevents further progress.

        {% if previous_attempt is defined %}
        # Previous Attempt
        Your previous solution was rejected. Here is the feedback:
        {{ feedback }}
        {% if issues is defined %}
        Issues: {{ issues }}
        {% endif %}
        Please fix the issues and try again.
        {% endif %}

      user: |
        {{ instruction }}

  critic:
    name: critic
    model: gemini-2.5-flash
    max_turns: 1
    max_tokens: 2048
    tools: []
    prompts:
      system: |
        You are a benchmark solution reviewer. You will be given a task and a proposed solution.
        Evaluate whether the solution appears to correctly and completely solve the task, with special attention to whether the worker verified the result.

      user: |
        # Task
        {{ instruction }}

        # Proposed Solution (Attempt {{ attempt }})
        {{ solution }}

        Evaluate whether this solution correctly solves the task.
