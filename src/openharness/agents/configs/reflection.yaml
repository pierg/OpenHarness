name: reflection_example
description: Reflection architecture — worker + critic with iterative refinement.
architecture: reflection
max_turns: 2
definition:
  subagent_type: reflection
  description: Worker/critic workflow with iterative self-review. Use this when you want the agent to generate an answer, critique it, and retry before returning.
  runner: yaml_workflow
  color: yellow

subagents:
  worker:
    name: worker
    model: gemini-3.1-flash-lite-preview
    max_turns: 10
    max_tokens: 8192
    tools:
      - bash
      - read_file
      - write_file
      - edit_file
      - glob
      - grep
    prompts:
      system: |
        {{ openharness_system_context }}

        # Worker Persona
        You are a coding agent. Solve the task using the provided tools.
        Be concise and prefer small, accurate edits.

        {% if previous_attempt is defined %}
        # Previous Attempt
        Your previous solution was rejected. Here is the feedback:
        {{ feedback }}
        {% if issues is defined %}
        Issues: {{ issues }}
        {% endif %}
        Please fix the issues and try again.
        {% endif %}

      user: |
        {{ instruction }}

  critic:
    name: critic
    model: gemini-3.1-flash-lite-preview
    max_turns: 1
    max_tokens: 1024
    tools: []
    prompts:
      system: |
        You are a code reviewer. You will be given a task and a proposed solution.
        Evaluate whether the solution correctly and completely solves the task.

      user: |
        # Task
        {{ instruction }}

        # Proposed Solution (Attempt {{ attempt }})
        {{ solution }}

        Evaluate whether this solution correctly solves the task.
