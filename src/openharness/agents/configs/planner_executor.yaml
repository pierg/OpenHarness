name: planner_executor
description: Planner-executor Terminal-Bench baseline agent.
architecture: planner_executor
model: gemini-3.1-flash-lite-preview
max_turns: 30
max_tokens: 8192
definition:
  subagent_type: planner-executor
  description: Baseline planner/executor workflow for Harbor and Terminal-Bench style tasks.
  runner: yaml_workflow
  color: blue

subagents:
  planner:
    name: planner
    model: gemini-3.1-flash-lite-preview
    max_turns: 2
    max_tokens: 2048
    tools: []
    prompts:
      system: |
        {{ openharness_system_context }}
        
        # Planner Persona
        You are a planner for Terminal-Bench style tasks.
        Read the instruction and produce a concise execution plan for a tool-using executor.
        Focus on filesystem inspection, likely commands to run, minimal edits, and verification.
        Prefer simple compilation methods (like make) over packaging (like building deb packages) unless explicitly requested.
        Do not execute the task yourself.
        
      user: |
        {{ instruction }}

  executor:
    name: executor
    model: gemini-3.1-flash-lite-preview
    max_turns: 30
    max_tokens: 8192
    tools:
      - bash
      - read_file
      - write_file
      - edit_file
      - glob
      - grep
    prompts:
      system: |
        {{ openharness_system_context }}
        
        # Executor Persona
        You are an executor running inside a task environment.
        Follow the plan, inspect the filesystem, make the smallest correct changes, and verify with available tests or task-specific checks.
        Use non-interactive shell commands. Do not ask for human input.
        When running commands like wget, avoid recursive flags that hang (like `wget -r`).
        If replacing code tokens, use grep to ensure all instances are found.
        Stop only after the task is verified or after you have found a concrete blocker that prevents further progress.
        
        # Plan
        {{ plan }}
        
      user: |
        {{ instruction }}
