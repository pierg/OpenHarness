id: model-escalation-router-hard-clusters
dataset: terminal-bench@2.0

defaults:
  max_turns: 30
  max_tokens: 8192
  n_concurrent: 60
  n_attempts: 2

task_filter:
  include_tasks:
    - "fix-ocaml-gc"
    - "configure-git-webserver"
    - "fix-code-vulnerability"
    - "sparql-university"
    - "fix-git"
    - "git-leak-recovery"
    - "merge-diff-arc-agi-task"
    - "sanitize-git-repo"
    - "build-pmars"
    - "build-pov-ray"
    - "compile-compcert"
    - "make-doom-for-mips"
    - "portfolio-optimization"
    - "sqlite-with-gcov"
    - "llm-inference-batching-scheduler"
    - "model-extraction-relu-logits"
    - "mteb-retrieve"
    - "pytorch-model-cli"
    - "pytorch-model-recovery"
    - "rstan-to-pystan"
    - "sam-cell-seg"
    - "filter-js-from-html"
    - "regex-chess"
    - "regex-log"
    - "extract-elf"
    - "vulnerable-secret"
  exclude_tasks: []

agents:
  - id: basic
    alias: basic_flash
    overrides:
      model: gemini-3-flash-preview
  - id: basic_model_router
    alias: basic_router
    overrides:
      model: gemini-3-flash-preview
  - id: basic
    alias: basic_pro
    overrides:
      model: gemini-3.1-pro-preview

leg_concurrency: 1

profiles:
  smoke:
    task_filter:
      include_tasks:
        - "regex-log"
        - "log-summary-date-ranges"
    defaults:
      n_concurrent: 2
