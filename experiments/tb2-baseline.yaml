id: tb2-baseline
dataset: terminal-bench@2.0

defaults:
  model: gemini-3.1-flash-lite-preview
  max_turns: 30
  max_tokens: 8192
  n_concurrent: 30
  n_attempts: 1

task_filter:
  include_tasks: []
  exclude_tasks: []

# `reflection` excluded pending a fix for context blow-up: a prior
# smoke run saw both reflection trials hit the 900 s harbor wall-clock
# at ~6.4 M input tokens / $0.67 each because tool outputs accumulate
# in the worker conversation faster than the 30-turn worker budget can
# exit. The fix is tracked as the `reflection-context-compaction` idea
# in lab/ideas.md and queued in lab/roadmap.md.
agents:
  - basic
  - planner_executor
  - react

# Run legs sequentially: each Harbor leg already parallelizes its own
# trials (see defaults above). Stacking parallel Harbor processes on top
# would multiply docker / API load without speeding up the slowest leg.
leg_concurrency: 1

profiles:
  # Smoke profile: a few of the lighter cached TB2 tasks (data processing /
  # text munging — no compile-from-source, no docker-in-docker). Enough to
  # confirm wiring end-to-end without burning hours. Stays at n_concurrent=2
  # so a laptop docker daemon never trips on the smoke check.
  smoke:
    task_filter:
      include_tasks:
        - "regex-log"
        - "log-summary-date-ranges"
    defaults:
      n_concurrent: 2
  # Demo profile: prior smoke target — kept for parity with older runs.
  demo:
    task_filter:
      include_tasks:
        - "build-*"
        - "git-*"
      n_tasks: 2
    defaults:
      n_concurrent: 2
