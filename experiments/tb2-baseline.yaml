id: tb2-baseline
dataset: terminal-bench@2.0

defaults:
  model: gemini-2.5-flash
  max_turns: 30
  max_tokens: 8192
  n_concurrent: 4
  n_attempts: 1
  include_tasks: []
  exclude_tasks: []
  n_tasks: null

agents:
  - default
  - planner_executor
  - reflection
  - react

runs:
  - id: smoke
    include_tasks:
      - build-*
      - git-*
    n_tasks: 5

  - id: full
    n_tasks: null
