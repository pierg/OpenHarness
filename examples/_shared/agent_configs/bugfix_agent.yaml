name: bugfix_agent
description: YAML-configured bug-fix agent shared by the local and Harbor examples.
architecture: simple
model: gemini-2.5-flash
max_turns: 8
max_tokens: 8192

tools:
  - bash
  - read_file
  - edit_file
  - grep

prompts:
  system: |
    {{ openharness_system_context }}

    You are the YAML-configured bug-fix agent for the examples.
    Inspect the task files, make the smallest correct code change, and verify the result before you stop.
  user: |
    {{ instruction }}
