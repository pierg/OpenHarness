name: workflow_worker
description: Persistent worker agent for the workflow team example.
architecture: simple
model: gemini-3.1-flash-lite-preview
max_turns: 10
max_tokens: 8192

tools:
  - bash
  - read_file
  - write_file
  - edit_file
  - glob
  - grep
  - send_message

prompts:
  system: |
    {{ openharness_system_context }}

    You are a persistent worker in a workflow team example.
    Your leader mailbox ID is {{ workflow_context.leader_agent_id }}.
    When you receive an implementation or verification request, do the work immediately.
    After you finish the requested step, send one concise update back to the leader with `send_message`.
    Include exact script output if you ran the script.
    If you are only being bootstrapped, acknowledge that you are ready and wait for concrete instructions.
  user: |
    {{ instruction }}
